site_name: HoneyAegis Documentation
site_description: Professional-grade, Docker-native honeypot platform documentation
site_url: https://thesecretchief.github.io/HoneyAegis/
repo_url: https://github.com/thesecretchief/HoneyAegis
repo_name: thesecretchief/HoneyAegis
edit_uri: edit/main/docs-site/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg
  favicon: assets/favicon.ico

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quick-start.md
    - Configuration: getting-started/configuration.md
    - Deployment Matrix: getting-started/deployment-matrix.md
  - Architecture:
    - Overview: architecture/overview.md
    - Data Flow: architecture/data-flow.md
    - Security Model: architecture/security-model.md
  - Features:
    - Dashboard: features/dashboard.md
    - Session Replay: features/session-replay.md
    - AI Analysis: features/ai-analysis.md
    - Threat Intelligence: features/threat-intel.md
    - Malware Sandbox: features/malware-sandbox.md
    - Alerting: features/alerting.md
    - Fleet Management: features/fleet-management.md
    - Honey Tokens: features/honey-tokens.md
    - SIEM Export: features/siem-export.md
  - Enterprise:
    - Multi-Tenant: enterprise/multi-tenant.md
    - RBAC: enterprise/rbac.md
    - SSO / OIDC: enterprise/sso.md
    - Audit Logging: enterprise/audit-logging.md
    - High Availability: enterprise/high-availability.md
    - Reporting: enterprise/reporting.md
  - API Reference:
    - Authentication: api/authentication.md
    - Sessions: api/sessions.md
    - Alerts: api/alerts.md
    - Sensors: api/sensors.md
    - Webhooks: api/webhooks.md
    - Export: api/export.md
  - Plugins:
    - Plugin Development: plugins/development.md
    - Plugin Marketplace: plugins/marketplace.md
    - Examples: plugins/examples.md
  - Deployment:
    - Docker Compose: deployment/docker-compose.md
    - Kubernetes: deployment/kubernetes.md
    - Raspberry Pi: deployment/raspberry-pi.md
    - Hardware Kits: deployment/hardware-kits.md
  - Contributing:
    - Development Setup: contributing/setup.md
    - Code Conventions: contributing/conventions.md
    - Changelog: contributing/changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/thesecretchief/HoneyAegis
  version:
    provider: mike

copyright: Copyright &copy; 2026 HoneyAegis Contributors — MIT License
