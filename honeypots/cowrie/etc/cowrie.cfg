# =============================================================================
# HoneyAegis Cowrie Configuration
# =============================================================================

[honeypot]
hostname = ${COWRIE_HOSTNAME}
log_path = /var/log/cowrie
download_path = /var/lib/cowrie/downloads
ttylog = true
ttylog_path = /var/log/cowrie/tty
interactive_timeout = 300
authentication_timeout = 120

[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0
version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6

[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

[output_jsonlog]
enabled = true
logfile = /var/log/cowrie/cowrie.json
epoch_timestamp = false

# Backend integration - logs are shipped via Vector or read directly by FastAPI
[output_hpfeeds]
enabled = false
