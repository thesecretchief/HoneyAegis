name: Bug Report
description: Report a bug or unexpected behavior in HoneyAegis
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: HoneyAegis Version
      description: Run `docker compose exec backend python -c "from app.main import app; print(app.version)"` or check the dashboard footer.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Type
      options:
        - Docker Compose (light profile)
        - Docker Compose (full profile)
        - Kubernetes / Helm
        - Raspberry Pi
        - Development (local)
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - amd64 (x86_64)
        - arm64 (aarch64 / RPi)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant logs from `docker compose logs backend` or browser console.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any additional environment details.
      placeholder: |
        OS: Ubuntu 22.04
        Docker: 24.0.7
        Browser: Chrome 120
