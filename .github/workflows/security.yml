name: Security Scan

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Python Security (Bandit)
  # ---------------------------------------------------------------------------
  bandit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit security scan
        run: bandit -r app/ -c pyproject.toml -f json -o bandit-report.json || true

      - name: Check for high/critical issues
        run: |
          bandit -r app/ -c pyproject.toml -ll -ii 2>&1
          if [ $? -ne 0 ]; then
            echo "::error::Bandit found high/critical security issues"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Docker Image Scan (Trivy)
  # ---------------------------------------------------------------------------
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image for scanning
        run: docker build -t honeyaegis-backend:scan ./backend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: honeyaegis-backend:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Dependency audit (npm)
  # ---------------------------------------------------------------------------
  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=critical || true
