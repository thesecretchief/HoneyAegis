name: CI

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Backend Tests
  # ---------------------------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/api/console.py
          python -m py_compile app/api/export.py
          python -m py_compile app/api/relay.py
          python -m py_compile app/api/billing.py
          python -m py_compile app/api/marketplace.py
          python -m py_compile app/services/analytics_service.py
          python -m py_compile app/workers/sensor_relay.py
          python -m py_compile app/api/threat_intel.py
          python -m py_compile app/api/sandbox.py
          python -m py_compile app/services/threat_intel_service.py
          python -m py_compile app/services/sandbox_service.py
          python -m py_compile app/services/advanced_ai_service.py
          python -m py_compile app/api/rbac.py
          python -m py_compile app/api/sso.py
          python -m py_compile app/api/reporting.py
          python -m py_compile app/api/benchmark.py
          python -m py_compile app/services/rbac_service.py
          python -m py_compile app/services/sso_service.py
          python -m py_compile app/services/reporting_service.py
          python -m py_compile app/services/benchmark_service.py

      - name: Run tests
        run: pytest --tb=short -q
        env:
          HONEYAEGIS_ENV: test

  # ---------------------------------------------------------------------------
  # Frontend Lint & Build
  # ---------------------------------------------------------------------------
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Docker Compose validation
  # ---------------------------------------------------------------------------
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
