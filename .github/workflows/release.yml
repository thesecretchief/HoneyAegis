name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Create GitHub Release with changelog and artifacts
  # ---------------------------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          awk '/^## \['"${{ steps.version.outputs.VERSION }}"'\]/{found=1;next} /^## \[/{if(found)exit} found' CHANGELOG.md > /tmp/release-notes.md
          echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/release-notes.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Generate sensor-only compose file
        run: |
          cat > /tmp/docker-compose.sensor.yml << 'COMPOSE'
          # HoneyAegis Sensor-Only Compose — for RPi / edge nodes
          # Connects back to a central HoneyAegis hub for data aggregation.
          #
          # Usage:
          #   HONEYAEGIS_HUB_URL=http://hub-ip:8000 docker compose -f docker-compose.sensor.yml up -d

          services:
            cowrie:
              image: ghcr.io/${{ github.repository }}/cowrie:${{ steps.version.outputs.VERSION }}
              container_name: honeyaegis-sensor-cowrie
              restart: unless-stopped
              environment:
                COWRIE_HOSTNAME: ${COWRIE_HOSTNAME:-sensor-01}
              volumes:
                - cowrie_logs:/var/log/cowrie
                - cowrie_downloads:/var/lib/cowrie/downloads
              ports:
                - "${COWRIE_SSH_PORT:-2222}:2222"
                - "${COWRIE_TELNET_PORT:-2223}:2223"
              cap_drop:
                - ALL
              cap_add:
                - NET_BIND_SERVICE
              read_only: true
              tmpfs:
                - /tmp

            relay:
              image: ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.VERSION }}
              container_name: honeyaegis-sensor-relay
              restart: unless-stopped
              command: python -m app.workers.sensor_relay
              environment:
                HONEYAEGIS_HUB_URL: ${HONEYAEGIS_HUB_URL:-http://localhost:8000}
                SENSOR_ID: ${SENSOR_ID:-sensor-01}
                SENSOR_TOKEN: ${SENSOR_TOKEN:-change-me}
              volumes:
                - cowrie_logs:/data/cowrie_logs:ro

          volumes:
            cowrie_logs:
            cowrie_downloads:
          COMPOSE

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: HoneyAegis ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.NOTES }}
          draft: false
          prerelease: false
          files: |
            /tmp/docker-compose.sensor.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Build and push tagged Docker images
  # ---------------------------------------------------------------------------
  build-images:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        include:
          - context: ./backend
            image: backend
          - context: ./frontend
            image: frontend
          - context: ./honeypots/cowrie
            image: cowrie

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
